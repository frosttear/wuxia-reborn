<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&amp;display=swap');
    </style>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f0d87a"/>
      <stop offset="45%"  stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8a6820"/>
    </linearGradient>
    <linearGradient id="sub-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#e2b96f"/>
      <stop offset="100%" stop-color="#a07838"/>
    </linearGradient>
    <radialGradient id="ring-glow" cx="50%" cy="50%" r="50%">
      <stop offset="60%"  stop-color="#1a1a2e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.06"/>
    </radialGradient>
    <filter id="glow" x="-25%" y="-60%" width="150%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="200" fill="#1a1a2e"/>

  <!-- Cycle ring atmosphere -->
  <circle cx="360" cy="100" r="83" fill="url(#ring-glow)"/>

  <!-- Rotating cycle ring (轮回) -->
  <g>
    <!-- Outer solid ring -->
    <circle cx="360" cy="100" r="83" fill="none" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.22"/>
    <!-- Inner dashed ring -->
    <circle cx="360" cy="100" r="76" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-dasharray="2 11" stroke-opacity="0.28"/>
    <!-- 12 tick marks (long at cardinal, short at others) -->
    <line x1="360" y1="14" x2="360" y2="22" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="360" y1="178" x2="360" y2="186" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="274" y1="100" x2="282" y2="100" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="438" y1="100" x2="446" y2="100" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.5"/>
    <!-- Diagonal ticks (shorter) -->
    <line x1="301" y1="27"  x2="305" y2="34"  stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>
    <line x1="419" y1="27"  x2="415" y2="34"  stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>
    <line x1="301" y1="173" x2="305" y2="166" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>
    <line x1="419" y1="173" x2="415" y2="166" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>
    <animateTransform attributeName="transform" type="rotate"
      from="0 360 100" to="360 360 100" dur="60s" repeatCount="indefinite"/>
  </g>

  <!-- Outer border (static) -->
  <rect x="6" y="6" width="708" height="188" rx="2" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <!-- Inner border -->
  <rect x="11" y="11" width="698" height="178" rx="1" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.25"/>

  <!-- Corner diamonds -->
  <text x="10"  y="26"  font-size="13" fill="#c9a84c" opacity="0.7" font-family="serif">◆</text>
  <text x="695" y="26"  font-size="13" fill="#c9a84c" opacity="0.7" font-family="serif">◆</text>
  <text x="10"  y="196" font-size="13" fill="#c9a84c" opacity="0.7" font-family="serif">◆</text>
  <text x="695" y="196" font-size="13" fill="#c9a84c" opacity="0.7" font-family="serif">◆</text>

  <!-- Left ornament -->
  <text x="28" y="106" font-size="18" fill="#c9a84c" opacity="0.35" font-family="serif" text-anchor="middle">❧</text>
  <!-- Right ornament -->
  <text x="692" y="106" font-size="18" fill="#c9a84c" opacity="0.35" font-family="serif" text-anchor="middle">❧</text>

  <!-- Main title -->
  <text
    x="360" y="125"
    text-anchor="middle"
    font-family="'Noto Serif SC', 'Songti SC', 'SimSun', serif"
    font-size="88"
    font-weight="400"
    fill="url(#gold-grad)"
    filter="url(#glow)"
    letter-spacing="14"
    transform="skewX(-4)">轮回江湖</text>

  <!-- Subtitle -->
  <text
    x="360" y="170"
    text-anchor="middle"
    font-family="'Noto Serif SC', 'Songti SC', 'SimSun', serif"
    font-size="15"
    font-weight="400"
    fill="url(#sub-grad)"
    letter-spacing="10"
    opacity="0.85">武侠世界线回溯</text>

  <!-- Flanking dots around subtitle -->
  <circle cx="178" cy="165" r="2.5" fill="#c9a84c" opacity="0.4"/>
  <circle cx="542" cy="165" r="2.5" fill="#c9a84c" opacity="0.4"/>
</svg>
