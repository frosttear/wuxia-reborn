<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1e2a3a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="400" fill="url(#bg)"/>

  <!-- Subtle ink wash circles -->
  <circle cx="150" cy="160" r="90" fill="url(#glow)"/>
  <circle cx="150" cy="160" r="72" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <circle cx="150" cy="160" r="54" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.12"/>

  <!-- Moon / empty circle motif -->
  <circle cx="150" cy="155" r="44" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.4"/>
  <circle cx="150" cy="155" r="38" fill="#0d1420" fill-opacity="0.7"/>

  <!-- Brush stroke silhouette (simplified swordsman) -->
  <!-- Head -->
  <ellipse cx="150" cy="122" rx="7" ry="8" fill="none" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.35"/>
  <!-- Body -->
  <line x1="150" y1="130" x2="150" y2="162" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.35" stroke-linecap="round"/>
  <!-- Arms -->
  <line x1="136" y1="145" x2="164" y2="145" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.35" stroke-linecap="round"/>
  <!-- Sword (right hand extended) -->
  <line x1="164" y1="145" x2="180" y2="129" stroke="#c9a84c" stroke-width="0.9" stroke-opacity="0.45" stroke-linecap="round"/>
  <!-- Legs / robe -->
  <line x1="150" y1="162" x2="142" y2="184" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.35" stroke-linecap="round"/>
  <line x1="150" y1="162" x2="158" y2="184" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.35" stroke-linecap="round"/>

  <!-- Decorative corner marks -->
  <line x1="18" y1="18" x2="40" y2="18" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="18" y1="18" x2="18" y2="40" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="282" y1="18" x2="260" y2="18" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="282" y1="18" x2="282" y2="40" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="18" y1="382" x2="40" y2="382" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="18" y1="382" x2="18" y2="360" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="282" y1="382" x2="260" y2="382" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="282" y1="382" x2="282" y2="360" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.3"/>

  <!-- Main text -->
  <text x="150" y="238" font-family="serif" font-size="20" fill="#c9a84c" fill-opacity="0.75" text-anchor="middle" letter-spacing="6">暂未入图</text>

  <!-- Divider -->
  <line x1="100" y1="252" x2="200" y2="252" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- Sub text -->
  <text x="150" y="278" font-family="serif" font-size="11" fill="#8a8a9a" text-anchor="middle" letter-spacing="2">图鉴尚在绘制中</text>
  <text x="150" y="298" font-family="serif" font-size="10" fill="#6a6a7a" text-anchor="middle" letter-spacing="1">敬请期待</text>
</svg>
