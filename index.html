<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>轮回江湖</title>
    <link rel="stylesheet" href="css/styles.css?v=0.24.16">
</head>
<body>

<!-- Start Screen -->
<div id="startScreen" style="display:flex; flex-direction:column; flex:1; align-items:center; justify-content:center; gap:24px;">
    <img src="assets/logo/title.svg" class="start-logo" alt="轮回江湖">
    <div class="start-sub">武侠 · 轮回 · 文字冒险</div>
    <div class="start-form">
        <input id="nameInput" class="start-input" type="text" placeholder="输入角色名" maxlength="8" value="独孤宸">
        <div class="start-birth-row">
            <span class="start-birth-label">出生月份</span>
            <select id="birthMonthInput" class="start-select">
                <option value="1">一月（正月）· 运气+2 开年纳福</option>
                <option value="2">二月（杏月）· 悟性+2 春雨润智</option>
                <option value="3">三月（桃月）· 敏捷+2 桃月轻灵</option>
                <option value="4">四月（槐月）· 体质+2 槐夏强壮</option>
                <option value="5">五月（蒲月）· 力量+2 烈日锻骨</option>
                <option value="6">六月（荷月）· 内力+2 荷月蓄元</option>
                <option value="7">七月（瓜月）· 运气+2 七夕天缘</option>
                <option value="8">八月（桂月）· 悟性+2 桂月明志</option>
                <option value="9">九月（菊月）· 敏捷+2 菊月清爽</option>
                <option value="10">十月（良月）· 体质+2 良月厚积</option>
                <option value="11">十一月（冬月）· 内力+2 寒凝真气</option>
                <option value="12">十二月（腊月）· 力量+2 苦寒百炼</option>
            </select>
        </div>
        <button id="startBtn" class="btn-confirm" style="width:200px; padding:10px">踏入江湖</button>
        <button id="continueBtn" class="btn-secondary" style="width:200px; padding:10px; display:none">继续前世</button>
    </div>
    <div style="font-size:0.75rem; color:var(--muted); max-width:320px; text-align:center; line-height:1.8;">
        一个武侠轮回故事。<br>
        每世行走江湖，结识人物，磨砺武艺。<br>        死后轮回，携前世记忆，再踏征途。<br>
        <strong style="color:var(--accent)">二十岁生辰，天魔如约而至。</strong>
    </div>
</div>

<!-- Game Screen (hidden until start) -->
<div id="gameScreen" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
    <header class="game-header">
        <img src="assets/logo/title-compact.svg" class="game-title-logo" alt="轮回江湖">
        <div class="header-controls">
            <button id="muteBtn" class="btn-small" style="display:none" onclick="(function(){ const m = GameAudio.toggleMute(); document.getElementById('muteBtn').textContent = m ? '🔇 静音' : '🔊 音效'; })()">🔊 音效</button>
            <button id="galleryBtn" class="btn-small" onclick="Gallery.open()">🖼 图鉴</button>
            <button id="exportBtn" class="btn-small" onclick="Engine.exportSave()">📤 导出</button>
            <button id="importBtn" class="btn-small" onclick="Engine.importSave()">📥 导入</button>
            <button id="resetBtn" class="btn-small btn-danger" onclick="if(confirm('确定重置？存档将清除。')){Engine.state.char=null;Engine.deleteSave();location.reload();}">重置</button>
        </div>
    </header>

    <!-- Mobile tab bar (hidden on desktop) -->
    <nav class="mobile-tabs" id="mobileTabs">
        <button class="tab-btn" data-tab="char" onclick="UI.switchTab('char')">⚔ 角色</button>
        <button class="tab-btn tab-active" data-tab="event" onclick="UI.switchTab('event')">📜 事件</button>
        <button class="tab-btn" data-tab="npc" onclick="UI.switchTab('npc')">👥 人物</button>
    </nav>

    <div class="game-layout">
        <!-- Left: Character + Job Tree -->
        <div class="panel panel-left" id="panelChar">
            <div class="panel-title">角色</div>
            <div class="char-header">
                <img class="player-avatar" alt="主角" onclick="UI.showPlayerLightbox()">
                <div class="char-info">
                    <div id="charName" class="char-name">—</div>
                    <div id="charAge" class="char-age">—</div>
                    <div id="charJob" class="char-job">—</div>
                    <div id="charRebirth" class="char-rebirth">—</div>
                </div>
            </div>

            <div class="hp-bar-wrap">
                <div class="hp-label">
                    <span>气血</span>
                    <span id="hpText">—</span>
                </div>
                <div class="hp-bar-bg">
                    <div id="hpBar" class="hp-fill hp-high" style="width:100%"></div>
                </div>
            </div>

            <div class="panel-title" style="margin-top:10px">属性</div>
            <div id="attributes"></div>
            <div id="combatStats" class="combat-stats"></div>

            <div class="panel-title" style="margin-top:12px">武道路线</div>
            <div id="jobPanel"></div>

            <div class="panel-title" style="margin-top:12px">已学技能</div>
            <div id="learnedSkills"></div>
        </div>

        <!-- Center: Event log -->
        <div class="center-panel mobile-active" id="panelEvent">
            <div id="eventLog" class="event-log"></div>
            <div id="choicesPanel" class="choices-panel"></div>
            <div class="controls-bar">
                <button id="nextMonthBtn" onclick="Engine.advanceMonth()">🚶 出门探险</button>
                <button id="visitBtn" onclick="UI.toggleVisitPanel()" style="display:none">💞 拜访</button>
                <button id="chainBtn" onclick="UI.toggleChainPanel()" style="display:none">📋 任务</button>
                <button id="finalBossBtn" onclick="if(confirm('【诸世共鸣】跳过剩余时间，立即触发最终决战？'))Engine.triggerFinalBossNow()" style="display:none;background:rgba(201,168,76,0.15);border-color:var(--accent);color:var(--accent)">✦ 诸世决战</button>
                <button id="testCombatBtn" onclick="UI.toggleTestCombatPanel()" style="font-size:0.75rem">⚔ 模拟战斗</button>
            </div>
            <div id="visitPanel" class="visit-panel" style="display:none"></div>
            <div id="chainPanel" class="chain-panel" style="display:none"></div>
            <div id="testCombatPanel" class="visit-panel" style="display:none; flex-direction:column; max-height:260px; overflow-y:auto"></div>
        </div>

        <!-- Right: NPC Relationships + Talents -->
        <div class="panel panel-right" id="panelNpc">
            <div class="panel-title">江湖人物</div>
            <div id="relationships"></div>

            <div class="panel-title" style="margin-top:16px">传承天赋</div>
            <div id="talents" class="talents-wrap"></div>

            <div class="panel-title" style="margin-top:16px">羁绊被动</div>
            <div id="passives" class="talents-wrap"></div>
        </div>
    </div>
</div>

<!-- Combat Overlay -->
<div id="combatOverlay" class="combat-overlay">
    <div class="combat-box">
        <div class="combat-title">⚔ 战斗</div>

        <div class="combat-enemy-section">
            <div class="combat-nameline">
                <span class="combat-side-name" id="combatEnemyName"></span>
                <span class="combat-stats-row" id="combatEnemyStats"></span>
            </div>
            <div class="combat-hp-wrap">
                <div class="combat-hp-label">
                    <span>气血</span><span id="combatEnemyHpText"></span>
                </div>
                <div class="hp-bar-bg"><div id="combatEnemyHpBar" class="hp-fill hp-high" style="width:100%"></div></div>
            </div>
            <div class="combat-momentum-wrap" id="combatEnemyMomentumWrap" style="display:none">
                <div class="combat-momentum-row">
                    <span class="combat-momentum-label">气力 <span id="combatEnemyMomentumVal">0</span>/<span id="combatEnemyMomentumMax">3</span></span>
                    <div class="combat-momentum-bar-bg"><div id="combatEnemyMomentumFill" class="combat-momentum-fill enemy-momentum-fill" style="width:0%"></div></div>
                </div>
                <div id="combatEnemySkillCharge" style="display:none"></div>
            </div>
        </div>

        <div id="combatLog" class="combat-log"></div>

        <div class="combat-player-section">
            <div class="combat-hp-wrap">
                <div class="combat-hp-label">
                    <span>气血</span><span id="combatPlayerHpText"></span>
                </div>
                <div class="hp-bar-bg"><div id="combatPlayerHpBar" class="hp-fill hp-high" style="width:100%"></div></div>
            </div>
            <div class="combat-nameline">
                <span class="combat-side-name" id="combatPlayerName"></span>
                <span class="combat-stats-row" id="combatPlayerStats"></span>
            </div>
        </div>

        <!-- Momentum bar + skill ready hint -->
        <div class="combat-momentum-wrap">
            <div class="combat-momentum-row">
                <span class="combat-momentum-label">气力 <span id="combatMomentumVal">0</span>/5</span>
                <div class="combat-momentum-bar-bg"><div id="combatMomentumFill" class="combat-momentum-fill" style="width:0%"></div></div>
            </div>
            <div id="combatSkillReady" class="combat-skill-ready" style="display:none"></div>
        </div>
        <!-- Enemy intent hint -->
        <div id="combatIntentHint" class="combat-intent-hint"></div>
        <!-- Result banner (shown after combat ends) -->
        <div id="combatResult" class="combat-result-banner" style="display:none"></div>
        <!-- Action preview bar (shown on first click) -->
        <div id="combatPreviewBar" class="combat-preview-bar" style="display:none"></div>
        <!-- Stance buttons -->
        <div class="combat-actions" id="combatActions">
            <button class="combat-btn combat-strike" onclick="UI.selectCombatAction('strike')">⚔ 强攻</button>
            <button class="combat-btn combat-defend" onclick="UI.selectCombatAction('defend')">🛡 防御</button>
            <button class="combat-btn combat-parry"  onclick="UI.selectCombatAction('parry')">⚡ 破招</button>
            <button class="combat-btn combat-focus"  onclick="UI.selectCombatAction('focus')">🔮 蓄势</button>
            <button class="combat-btn combat-flee" id="combatFleeBtn" onclick="UI.selectCombatAction('flee')">🏃 逃跑 25%</button>
            <button class="combat-btn combat-quickbattle" id="combatQuickBtn" onclick="Engine.handleQuickCombat()" title="快速战斗：蒙特卡洛模拟，立即得出结果">⏩ 快速战斗</button>
            <button class="combat-btn combat-return-btn" id="combatReturnBtn" style="display:none">📋 点击返回</button>
        </div>
    </div>
</div>

<script>
// Synchronous: swap start screen to loading indicator if a save already exists
if (localStorage.getItem('wuxia_save')) {
    document.getElementById('startScreen').innerHTML = `
        <img src="assets/logo/title.svg" class="start-logo" alt="轮回江湖">
        <div class="start-sub">武侠 · 轮回 · 文字冒险</div>
        <img src="assets/illustrations/rebirth.jpg" class="loading-illus" alt="">
        <div class="loading-text">读取存档中</div>`;
}
</script>
<script src="js/audio.js?v=0.24.16"></script>
<script src="js/character.js?v=0.24.16"></script>
<script src="js/npc.js?v=0.24.16"></script>
<script src="js/combat.js?v=0.24.16"></script>
<script src="js/rebirth.js?v=0.24.16"></script>
<script src="js/engine.js?v=0.24.16"></script>
<script src="js/gallery.js?v=0.24.16"></script>
<script src="js/ui.js?v=0.24.16"></script>
<script>
(async function() {
    await Engine.init();
    UI.init();
    GameAudio.init();
    const muteBtn = document.getElementById('muteBtn');
    if (muteBtn && GameAudio.isMuted()) muteBtn.textContent = '🔇 静音';

    // Save combat state on page close/refresh
    window.addEventListener('beforeunload', () => { Engine.saveGame(); });

    const saved = Engine.loadGame();
    if (saved) {
        Engine.state.char = saved;
        const job = Engine.getJob(saved.job);
        if (!saved.hp) saved.hp = Character.getHPMax(saved, job);
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'flex';
        try {
            const savedLog = localStorage.getItem('wuxia_log');
            if (savedLog) UI.restoreLog(JSON.parse(savedLog));
        } catch(e) {}
        // Restore gamePhase from localStorage
        const savedPhase = localStorage.getItem('wuxia_phase') || 'idle';
        // Resume combat if it was active when page was closed
        let combatResumed = false;
        const rawSavedCombat = localStorage.getItem('wuxia_combat');
        if (rawSavedCombat) {
            try {
                const parsed = JSON.parse(rawSavedCombat);
                const { cs, pendingChainStep } = parsed;
                Engine.state.combatState = cs;
                Engine.state.pendingChainStep = pendingChainStep || null;
                Engine.state._isTestCombat = parsed.isTestCombat || false;
                Engine.state._testCombatSnapshot = parsed.testCombatSnapshot || null;
                Engine.state.gamePhase = 'combat';
                UI.renderAll(Engine.state);
                UI.showCombatOverlay(Engine.state);
                UI.addLog('【战斗恢复】刷新前的战斗已恢复。', 'system');
                combatResumed = true;
            } catch(e) {
                console.error('Combat restore failed:', e);
                localStorage.removeItem('wuxia_combat');
            }
        }
        if (!combatResumed) {
            // If saved phase was victory/rebirth, re-trigger the rebirth screen
            if (savedPhase === 'victory' || savedPhase === 'rebirth') {
                Engine.state.gamePhase = 'idle'; // temporarily idle for renderAll
                UI.renderAll(Engine.state);
                Engine.triggerDeath('page_reload');
            } else {
                // If combat phase but no combat restored, fall back to idle
                Engine.state.gamePhase = (savedPhase === 'combat') ? 'idle' : savedPhase;
                UI.renderAll(Engine.state);
            }
        }
    }

    const startBtn = document.getElementById('startBtn');
    if (startBtn) startBtn.onclick = function() {
        const name = document.getElementById('nameInput').value.trim() || '无名';
        const birthMonth = parseInt(document.getElementById('birthMonthInput').value) || 1;
        Engine.deleteSave();
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'flex';
        Engine.startNewGame(name, birthMonth, {}, []);
    };

    const nameInput = document.getElementById('nameInput');
    if (nameInput) nameInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') document.getElementById('startBtn').click();
    });

    // Register service worker for persistent image caching
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
    }
})();
</script>
<!-- Gallery Overlay -->
<div class="gallery-overlay" id="galleryOverlay" onclick="Gallery.close()">
    <div class="gallery-box" onclick="event.stopPropagation()">
        <div class="gallery-header">
            <span class="gallery-title">图　鉴</span>
            <div class="gallery-tabs" id="galleryTabs"></div>
            <button class="gallery-close-btn" onclick="Gallery.close()">✕</button>
        </div>
        <div class="gallery-grid" id="galleryGrid"></div>
        <div class="gallery-replay-panel" id="galleryReplayPanel">
            <button class="gallery-replay-back" id="galleryReplayBack">← 返回</button>
            <div class="gallery-replay-title" id="galleryReplayTitle"></div>
            <div class="gallery-replay-log" id="galleryReplayLog"></div>
        </div>
    </div>
</div>
<!-- Gallery Lightbox -->
<div class="gallery-lightbox" id="galleryLightbox" onclick="Gallery.closeLightbox()">
    <div class="gallery-lb-box" onclick="event.stopPropagation()">
        <button class="gallery-lb-nav gallery-lb-prev" id="galleryLbPrev" onclick="Gallery.navigateLightboxAnimated(-1)">&#8249;</button>
        <div class="gallery-lb-stage" id="galleryLbStage">
            <div class="gallery-lb-content" id="galleryLbContent0">
                <img class="gallery-lb-img" src="" alt="">
                <div class="gallery-lb-info">
                    <div class="gallery-lb-name"></div>
                    <div class="gallery-lb-category"></div>
                    <div class="gallery-lb-hint"></div>
                </div>
            </div>
            <div class="gallery-lb-content" id="galleryLbContent1">
                <img class="gallery-lb-img" src="" alt="">
                <div class="gallery-lb-info">
                    <div class="gallery-lb-name"></div>
                    <div class="gallery-lb-category"></div>
                    <div class="gallery-lb-hint"></div>
                </div>
            </div>
            <div class="gallery-lb-content" id="galleryLbContent2">
                <img class="gallery-lb-img" src="" alt="">
                <div class="gallery-lb-info">
                    <div class="gallery-lb-name"></div>
                    <div class="gallery-lb-category"></div>
                    <div class="gallery-lb-hint"></div>
                </div>
            </div>
        </div>
        <button class="gallery-lb-nav gallery-lb-next" id="galleryLbNext" onclick="Gallery.navigateLightboxAnimated(1)">&#8250;</button>
        <button class="gallery-lb-close" onclick="Gallery.closeLightbox()">✕</button>
    </div>
</div>
<div class="avatar-lightbox" id="avatarLightbox" onclick="this.classList.remove('active')">
    <div class="lb-card" onclick="event.stopPropagation()">
        <img id="avatarLightboxImg" src="" alt="">
        <div class="lb-info" id="avatarLightboxInfo"></div>
    </div>
</div>
</body>
</html>
