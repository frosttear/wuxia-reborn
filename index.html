<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轮回江湖</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=0.5.1">
</head>
<body>

<!-- Start Screen -->
<div id="startScreen" style="display:flex; flex-direction:column; flex:1; align-items:center; justify-content:center; gap:24px;">
    <div class="start-title">轮回江湖</div>
    <div class="start-sub">武侠 · 轮回 · 文字冒险</div>
    <div class="start-form">
        <input id="nameInput" class="start-input" type="text" placeholder="输入角色名" maxlength="8" value="萧尘">
        <div class="start-birth-row">
            <span class="start-birth-label">出生月份</span>
            <select id="birthMonthInput" class="start-select">
                <option value="1">一月（正月）· 运气+2 开年纳福</option>
                <option value="2">二月（杏月）· 悟性+2 春雨润智</option>
                <option value="3">三月（桃月）· 敏捷+2 桃月轻灵</option>
                <option value="4">四月（槐月）· 体质+2 槐夏强壮</option>
                <option value="5">五月（蒲月）· 力量+2 烈日锻骨</option>
                <option value="6">六月（荷月）· 内力+2 荷月蓄元</option>
                <option value="7">七月（瓜月）· 运气+2 七夕天缘</option>
                <option value="8">八月（桂月）· 悟性+2 桂月明志</option>
                <option value="9">九月（菊月）· 敏捷+2 菊月清爽</option>
                <option value="10">十月（良月）· 体质+2 良月厚积</option>
                <option value="11">十一月（冬月）· 内力+2 寒凝真气</option>
                <option value="12">十二月（腊月）· 力量+2 苦寒百炼</option>
            </select>
        </div>
        <button id="startBtn" class="btn-confirm" style="width:200px; padding:10px">踏入江湖</button>
        <button id="continueBtn" class="btn-secondary" style="width:200px; padding:10px; display:none">继续前世</button>
    </div>
    <div style="font-size:0.75rem; color:var(--muted); max-width:320px; text-align:center; line-height:1.8;">
        一个武侠轮回故事。<br>
        每世行走江湖，结识人物，磨砺武艺。<br>        死后轮回，携前世记忆，再踏征途。<br>
        <strong style="color:var(--accent)">二十岁生辰，天魔如约而至。</strong>
    </div>
</div>

<!-- Game Screen (hidden until start) -->
<div id="gameScreen" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
    <header class="game-header">
        <div class="game-title">轮回江湖</div>
        <div class="header-controls">
            <button id="saveInfoBtn" class="btn-small" style="opacity:0.6; cursor:default" disabled>自动存档</button>
            <button id="resetBtn" class="btn-small btn-danger" onclick="if(confirm('确定重置？存档将清除。')){Engine.deleteSave();location.reload();}">重置</button>
        </div>
    </header>

    <!-- Mobile tab bar (hidden on desktop) -->
    <nav class="mobile-tabs" id="mobileTabs">
        <button class="tab-btn" data-tab="char" onclick="UI.switchTab('char')">⚔ 角色</button>
        <button class="tab-btn tab-active" data-tab="event" onclick="UI.switchTab('event')">📜 事件</button>
        <button class="tab-btn" data-tab="npc" onclick="UI.switchTab('npc')">👥 人物</button>
    </nav>

    <div class="game-layout">
        <!-- Left: Character + Job Tree -->
        <div class="panel panel-left" id="panelChar">
            <div class="panel-title">角色</div>
            <div id="charName" class="char-name">—</div>
            <div id="charAge" class="char-age">—</div>
            <div id="charJob" class="char-job">—</div>
            <div id="charRebirth" class="char-rebirth">—</div>

            <div class="hp-bar-wrap">
                <div class="hp-label">
                    <span>气血</span>
                    <span id="hpText">—</span>
                </div>
                <div class="hp-bar-bg">
                    <div id="hpBar" class="hp-fill hp-high" style="width:100%"></div>
                </div>
            </div>

            <div class="panel-title" style="margin-top:10px">属性</div>
            <div id="attributes"></div>
            <div id="combatStats" class="combat-stats"></div>

            <div class="panel-title" style="margin-top:12px">武道路线</div>
            <div id="jobPanel"></div>

            <div class="panel-title" style="margin-top:12px">已学技能</div>
            <div id="learnedSkills"></div>
        </div>

        <!-- Center: Event log -->
        <div class="center-panel mobile-active" id="panelEvent">
            <div id="eventLog" class="event-log"></div>
            <div id="choicesPanel" class="choices-panel"></div>
            <div class="controls-bar">
                <button id="nextMonthBtn" onclick="Engine.advanceMonth()">出门探险 ▶</button>
                <button id="visitBtn" onclick="UI.toggleVisitPanel()" style="display:none">💞 拜访</button>
                <button id="chainBtn" onclick="UI.toggleChainPanel()" style="display:none">📜 线索</button>
                <button id="autoAdvanceBtn" onclick="Engine.toggleAuto()">▶ 自动</button>
            </div>
            <div id="visitPanel" class="visit-panel" style="display:none"></div>
            <div id="chainPanel" class="chain-panel" style="display:none"></div>
        </div>

        <!-- Right: NPC Relationships + Talents -->
        <div class="panel panel-right" id="panelNpc">
            <div class="panel-title">江湖人物</div>
            <div id="relationships"></div>

            <div class="panel-title" style="margin-top:16px">传承天赋</div>
            <div id="talents" class="talents-wrap"></div>

            <div class="panel-title" style="margin-top:16px">羁绊被动</div>
            <div id="passives" class="talents-wrap"></div>
        </div>
    </div>
</div>

<!-- Combat Overlay -->
<div id="combatOverlay" class="combat-overlay">
    <div class="combat-box">
        <div class="combat-title">⚔ 战斗</div>

        <div class="combat-enemy-section">
            <div class="combat-side-name" id="combatEnemyName"></div>
            <div class="combat-stats-row" id="combatEnemyStats"></div>
            <div class="combat-hp-wrap">
                <div class="combat-hp-label">
                    <span>气血</span><span id="combatEnemyHpText"></span>
                </div>
                <div class="hp-bar-bg"><div id="combatEnemyHpBar" class="hp-fill hp-high" style="width:100%"></div></div>
            </div>
        </div>

        <div id="combatLog" class="combat-log"></div>

        <div class="combat-player-section">
            <div class="combat-hp-wrap">
                <div class="combat-hp-label">
                    <span>气血</span><span id="combatPlayerHpText"></span>
                </div>
                <div class="hp-bar-bg"><div id="combatPlayerHpBar" class="hp-fill hp-high" style="width:100%"></div></div>
            </div>
            <div class="combat-stats-row" id="combatPlayerStats"></div>
            <div class="combat-side-name" id="combatPlayerName"></div>
        </div>

        <!-- Momentum bar + skill ready hint -->
        <div class="combat-momentum-wrap">
            <div class="combat-momentum-label">势能 <span id="combatMomentumVal">0</span>/5</div>
            <div class="combat-momentum-bar-bg"><div id="combatMomentumFill" class="combat-momentum-fill" style="width:0%"></div></div>
            <div id="combatSkillReady" class="combat-skill-ready" style="display:none"></div>
        </div>
        <!-- Enemy intent hint -->
        <div id="combatIntentHint" class="combat-intent-hint"></div>
        <!-- Stance buttons -->
        <div class="combat-actions" id="combatActions">
            <button class="combat-btn combat-strike" title="刚攻：高伤害，对防御效果更强" onclick="Engine.handleCombatAction('strike')">⚔ 刚攻</button>
            <button class="combat-btn combat-quick"  title="巧攻：穿透30%防御，快速积势" onclick="Engine.handleCombatAction('quick')">💨 巧攻</button>
            <button class="combat-btn combat-defend" title="防御：大幅减少受击（对方刚攻-75%，巧攻-50%）" onclick="Engine.handleCombatAction('defend')">🛡 防御</button>
            <button class="combat-btn combat-parry"  title="化解：克制对方刚攻（反击）；被对方巧攻破招" onclick="Engine.handleCombatAction('parry')">⚡ 化解</button>
            <button class="combat-btn combat-focus"  title="蓄势：势能+2，减伤55%" onclick="Engine.handleCombatAction('focus')">🔮 蓄势</button>
            <button class="combat-btn combat-flee" id="combatFleeBtn" onclick="Engine.handleCombatAction('flee')">� 逃跑 25%</button>
            <button class="combat-btn combat-quickbattle" id="combatQuickBtn" onclick="Engine.handleQuickCombat()" title="快速战斗：蒙特卡洛模拟，立即得出结果">⚡ 快战</button>
            <button class="combat-btn combat-return-btn" id="combatReturnBtn" style="display:none">📋 点击返回</button>
        </div>
    </div>
</div>

<script src="js/character.js?v=0.5.1"></script>
<script src="js/npc.js?v=0.5.1"></script>
<script src="js/combat.js?v=0.5.1"></script>
<script src="js/rebirth.js?v=0.5.1"></script>
<script src="js/engine.js?v=0.5.1"></script>
<script src="js/ui.js?v=0.5.1"></script>
<script>
(async function() {
    await Engine.init();
    UI.init();

    const saved = Engine.loadGame();
    if (saved) {
        Engine.state.char = saved;
        const job = Engine.getJob(saved.job);
        if (!saved.hp) saved.hp = Character.getHPMax(saved, job);
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'flex';
        try {
            const savedLog = localStorage.getItem('wuxia_log');
            if (savedLog) UI.restoreLog(JSON.parse(savedLog));
        } catch(e) {}
        // Resume combat if it was active when page was closed
        let combatResumed = false;
        try {
            const savedCombat = localStorage.getItem('wuxia_combat');
            if (savedCombat) {
                const { cs, pendingChainStep } = JSON.parse(savedCombat);
                Engine.state.combatState = cs;
                Engine.state.pendingChainStep = pendingChainStep || null;
                Engine.state.gamePhase = 'combat';
                UI.renderAll(Engine.state);
                UI.showCombatOverlay(Engine.state);
                UI.addLog('【战斗恢复】刷新前的战斗已恢复。', 'system');
                combatResumed = true;
            }
        } catch(e) {}
        if (!combatResumed) {
            UI.renderAll(Engine.state);
        }
    }

    document.getElementById('startBtn').onclick = function() {
        const name = document.getElementById('nameInput').value.trim() || '无名';
        const birthMonth = parseInt(document.getElementById('birthMonthInput').value) || 1;
        Engine.deleteSave();
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'flex';
        Engine.startNewGame(name, birthMonth, {}, []);
    };

    document.getElementById('continueBtn').onclick = function() {
        const char = Engine.loadGame();
        if (!char) return;
        Engine.state.char = char;
        const job = Engine.getJob(char.job);
        if (!char.hp) char.hp = Character.getHPMax(char, job);
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'flex';
        UI.renderAll(Engine.state);
        try {
            const savedLog = localStorage.getItem('wuxia_log');
            if (savedLog) UI.restoreLog(JSON.parse(savedLog));
        } catch(e) {}
        UI.addLog('欢迎回来，继续你的江湖之旅。', 'system');
    };

    document.getElementById('nameInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') document.getElementById('startBtn').click();
    });
})();
</script>
</body>
</html>
